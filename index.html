<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>English — Tặng em bé của anh</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#fff1f2; --bg2:#fdf2f8; --bg3:#f5f3ff;
    --card: rgba(255,255,255,0.9);
    --card-strong: #ffffff;
    --border: #fecdd3;
    --border-soft: #ffe4e6;
    --text:#1e293b; --muted:#64748b;
    --accent:#f43f5e; --accent-2:#ec4899; --accent2:#8b5cf6; --violet:#8b5cf6; --good:#10b981; --bad:#f43f5e;
    --radius:24px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Quicksand',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    background-attachment:fixed;
    min-height:100vh;
    overflow-x:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app{max-width:680px;margin:0 auto;padding:18px 16px 110px;}
  header{text-align:center;margin:8px 0 18px;}
  header h1{font-size:26px;margin:0;font-weight:700;letter-spacing:.3px;
    background:linear-gradient(90deg,var(--accent),var(--violet));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .gift{font-size:13px;font-style:italic;color:var(--accent);font-weight:500;margin-top:4px;
    font-family:'Playfair Display',serif;}
  .sync{font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:6px;justify-content:center;align-items:center;}
  .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;display:inline-block;}
  .dot.on{background:var(--good);box-shadow:0 0 8px var(--good);}
  .dot.off{background:var(--bad);}

  .glass{
    background:var(--card);
    border:1px solid var(--border-soft);
    border-radius:var(--radius);
    backdrop-filter:blur(8px) saturate(120%);
    -webkit-backdrop-filter:blur(8px) saturate(120%);
    box-shadow:0 4px 20px rgba(244,63,94,0.06);
  }

  /* Tab grid */
  .tabs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
  .tab{
    padding:22px 16px;text-align:center;cursor:pointer;
    transition:transform .15s ease, box-shadow .2s;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .tab:active{transform:scale(.96);}
  .tab .ic{font-size:30px;}
  .tab .nm{font-weight:700;font-size:16px;color:var(--text);}
  .tab .sub{font-size:11px;color:var(--muted);}

  /* Buttons */
  button{font-family:inherit;color:var(--text);cursor:pointer;border:none;}
  .btn{
    background:#fff;border:1px solid var(--border);color:var(--accent);
    border-radius:14px;padding:11px 16px;font-size:15px;font-weight:700;
    transition:transform .12s, box-shadow .2s, background .2s;
  }
  .btn:active{transform:scale(.95);}
  .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));border:none;color:#fff;
    box-shadow:0 4px 14px rgba(244,63,94,0.3);}
  .btn.cyan{background:linear-gradient(90deg,var(--violet),#a78bfa);border:none;color:#fff;
    box-shadow:0 4px 14px rgba(139,92,246,0.3);}
  .btn.ghost{background:#fff;border:1px solid #e2e8f0;color:var(--muted);}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:11px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .row.between{justify-content:space-between;align-items:center;}

  input,select,textarea{
    width:100%;font-family:inherit;font-size:15px;color:var(--text);
    background:#f8fafc;border:1px solid #e2e8f0;
    border-radius:12px;padding:11px 13px;outline:none;transition:border .2s, box-shadow .2s;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(244,63,94,0.15);}
  input::placeholder,textarea::placeholder{color:#94a3b8;}
  select option{color:#111;}
  label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin:10px 0 5px;}

  /* Modal */
  .overlay{
    position:fixed;inset:0;z-index:50;display:none;
    align-items:center;justify-content:center;padding:18px;
    background:rgba(15,23,42,0.4);backdrop-filter:blur(6px);
    animation:fade .2s ease;
  }
  .overlay.show{display:flex;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    width:100%;max-width:560px;max-height:86vh;overflow:auto;
    background:var(--card-strong);border:1px solid var(--border);
    box-shadow:0 20px 50px rgba(15,23,42,0.2);
    padding:20px;animation:pop .25s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}
  .modal h2{margin:0 0 4px;font-size:20px;color:var(--text);}
  .modal h3{color:var(--text);}
  .modal .close{position:sticky;top:0;float:right;font-size:22px;line-height:1;
    background:transparent;border:none;color:#94a3b8;padding:2px 6px;margin:-6px -6px 0 0;}

  /* Premium Word Cards */
  .item {
    position: relative;
    padding: 16px 20px;
    margin: 12px 0;
    border-radius: 20px;
    background: #ffffff;
    border: 1px solid var(--border-soft);
    border-left: 5px solid var(--accent);
    box-shadow: 0 4px 12px rgba(244,63,94,0.03);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(244,63,94,0.07);
  }
  .item-content {
    flex: 1;
    min-width: 0;
  }
  .item-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .item .w {
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
  }
  .speak-badge {
    background: #fff0f1;
    color: var(--accent);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  .speak-badge:hover {
    transform: scale(1.1);
    background: #ffe1e3;
  }
  .topic-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    text-transform: capitalize;
    letter-spacing: 0.3px;
  }
  .item .ipa {
    color: var(--violet);
    font-size: 12.5px;
    font-weight: 600;
    background: #f5f3ff;
    padding: 2px 6px;
    border-radius: 6px;
    display: inline-block;
  }
  .item .mean {
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    margin-top: 4px;
  }
  .card-example {
    font-size: 12.5px;
    color: var(--muted);
    font-style: italic;
    margin-top: 8px;
    padding: 6px 10px;
    background: #f8fafc;
    border-left: 2.5px solid #cbd5e1;
    border-radius: 0 8px 8px 0;
  }
  .item .acts {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .iconbtn {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    color: var(--muted);
    border-radius: 12px;
    width: 38px;
    height: 38px;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .iconbtn:hover {
    transform: scale(1.05);
  }
  .iconbtn.edit-btn:hover {
    background: #f0fdf4;
    border-color: #bbf7d0;
    color: #10b981;
  }
  .iconbtn.del-btn:hover {
    background: #fef2f2;
    border-color: #fee2e2;
    color: #ef4444;
  }

  .pill{display:inline-block;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;color:var(--accent);
    background:#fff;border:1px solid var(--border);margin:0 6px 6px 0;cursor:pointer;}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;
    box-shadow:0 2px 8px rgba(244,63,94,0.25);}

  .count{font-size:13px;color:var(--muted);}
  .center{text-align:center;}
  .big{font-size:28px;font-weight:800;margin:10px 0;color:var(--text);}
  .muted{color:var(--muted);}
  .hidden{display:none!important;}
  .scroll{max-height:58vh;overflow:auto;margin-top:8px;}
  .field{margin-bottom:6px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .res-good{color:var(--good);font-weight:700;}
  .res-bad{color:var(--bad);font-weight:700;}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);
    background:rgba(15,23,42,0.9);color:#fff;border:none;padding:11px 18px;
    border-radius:14px;font-size:14px;font-weight:600;z-index:99;opacity:0;transition:opacity .25s;box-shadow:0 8px 24px rgba(15,23,42,0.25);}
  .toast.show{opacity:1;}
  .ipagrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .ipacell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    padding:14px 6px;background:#fff;border:1px solid var(--border-soft);border-radius:16px;
    box-shadow:0 2px 8px rgba(244,63,94,0.04);transition:transform .12s;}
  .ipacell:active{transform:scale(.95);}
  .ipacell.vowel{border:1.5px solid #f59e0b;}
  .ipacell.cons{border:1.5px solid #10b981;}
  .ipacell .sym{font-size:18px;font-weight:800;color:var(--text);}
  .ipacell.vowel .sym{color:#d97706;}
  .ipacell.cons .sym{color:#059669;}
  .ipacell .wd{font-size:12px;font-weight:700;color:var(--muted);}
  .ipacell .ix{font-size:10px;font-style:italic;color:#94a3b8;}
  .pairhead{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 4px;
    font-size:13px;font-weight:700;color:var(--muted);text-align:center;}
  .pairrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0;}
  .pairside{display:flex;justify-content:space-between;align-items:center;gap:8px;text-align:left;
    padding:11px 13px;background:#fff;border:1px solid var(--border-soft);border-radius:14px;
    box-shadow:0 2px 8px rgba(244,63,94,0.04);transition:transform .12s;}
  .pairside:active{transform:scale(.97);}
  .pairside .w{font-weight:700;font-size:15px;color:var(--text);}
  .pairside .ipa{color:var(--violet);font-size:12px;font-style:italic;}
  .pairside .mean{color:var(--muted);font-size:11px;}
  .pairside .spk{color:var(--accent);font-size:16px;flex-shrink:0;}
  .speak{cursor:pointer;}

  /* Listening Practice Styles */
  @keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
    70% { transform: scale(1.06); box-shadow: 0 0 0 12px rgba(244, 63, 94, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
  }
  .pulse-icon {
    animation: pulse 2s infinite;
    background: #ffe4e6;
    color: var(--accent);
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin: 0 auto 12px;
  }
  .listen-settings {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .listen-settings label {
    margin: 0 0 4px 0;
  }
  .listen-card {
    text-align: center;
    padding: 30px 20px;
    margin: 16px 0;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .listen-card .en-text {
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-word;
  }
  .listen-card .ipa-text {
    color: var(--violet);
    font-size: 15px;
    font-style: italic;
    margin-bottom: 8px;
  }
  .listen-card .vi-text {
    font-size: 18px;
    color: var(--muted);
    font-weight: 500;
    word-break: break-word;
  }
  .listen-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
  }
  .listen-controls .btn-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    border: 1px solid var(--border-soft);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    cursor: pointer;
    transition: transform 0.1s;
    color: var(--text);
  }
  .listen-controls .btn-icon:active {
    transform: scale(0.92);
  }
  .listen-controls .btn-play {
    width: 58px;
    height: 58px;
    font-size: 22px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border: none;
    color: white;
    box-shadow: 0 4px 14px rgba(244,63,94,0.3);
  }
  .listen-controls .btn-play:active {
    transform: scale(0.95);
  }
  /* Scramble & Audio Quiz Styles */
  .word-block {
    display: inline-block;
    padding: 8px 14px;
    margin: 5px;
    border-radius: 12px;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.1s;
    user-select: none;
  }
  .word-block:active {
    transform: scale(0.95);
  }
  .word-block.used {
    opacity: 0.3;
    pointer-events: none;
  }
  .assembly-area {
    min-height: 54px;
    padding: 10px;
    background: #f8fafc;
    border: 1px dashed var(--border);
    border-radius: 16px;
    margin: 14px 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }
  .audio-quiz-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    font-size: 26px;
    background: #ffe4e6;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    margin: 0 auto 12px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .audio-quiz-btn:active {
    transform: scale(0.92);
  }
  
  /* Mascot floating widget */
  .mascot-widget {
    position: fixed;
    width: 90px;
    height: 90px;
    z-index: 1000;
    cursor: grab;
    user-select: none;
    touch-action: none;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.12));
    transition: transform 0.1s ease;
  }
  @media (max-width: 600px) {
    .mascot-widget {
      width: 75px;
      height: 75px;
    }
  }
  .mascot-widget:active {
    cursor: grabbing;
    transform: scale(1.05);
  }
  .mascot-widget canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: transparent;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>English Garden</h1>
    <div class="gift">Tặng em bé của anh 💛</div>
    <div class="sync"><span id="syncDot" class="dot"></span><span id="syncText">Đang kết nối…</span></div>
  </header>

  <div class="tabs">
    <div class="tab glass" data-open="vocab"><div class="ic">📚</div><div class="nm">Từ vựng</div><div class="sub" id="cntVocab">0 từ</div></div>
    <div class="tab glass" data-open="sentences"><div class="ic">📝</div><div class="nm">Câu dài</div><div class="sub" id="cntSent">0 câu</div></div>
    <div class="tab glass" data-open="quiz"><div class="ic">🎯</div><div class="nm">Kiểm tra</div><div class="sub">Trắc nghiệm & điền từ</div></div>
    <div class="tab glass" data-open="pron"><div class="ic">🔊</div><div class="nm">Phát âm</div><div class="sub">Chuẩn IPA</div></div>
    <div class="tab glass" data-open="listen"><div class="ic">🎧</div><div class="nm">Luyện nghe</div><div class="sub">Nghe liên tục</div></div>
    <div class="tab glass" data-open="garden"><div class="ic">🌸</div><div class="nm">Love Garden</div><div class="sub" id="cntWater">0 💧</div></div>
  </div>

  <div class="glass" style="padding:16px;">
    <div class="row between">
      <span class="count">☁️ Dữ liệu đồng bộ qua Firebase</span>
      <button class="btn sm ghost" id="btnBackup">Sao lưu JSON</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal glass" id="modal">
    <button class="close" id="modalClose">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">

let gardenState = null;

["storm","/stɔːm/","bão","nature"],["thunder","/ˈθʌndə/","sấm","nature"],["lightning","/ˈlaɪtnɪŋ/","chớp","nature"],
["rainbow","/ˈreɪnbəʊ/","cầu vồng","nature"],["fog","/fɒɡ/","sương mù","nature"],["fire","/ˈfaɪə/","lửa","nature"],
["earth","/ɜːθ/","trái đất","nature"],["stone","/stəʊn/","đá","nature"],["sand","/sænd/","cát","nature"],
["soil","/sɔɪl/","đất","nature"],["valley","/ˈvæli/","thung lũng","nature"],["waterfall","/ˈwɔːtəfɔːl/","thác nước","nature"],

/* ---------- Text-to-speech ---------- */
const TTS = "speechSynthesis" in window;
let preferredVoice = null;

function getBestVoice() {
  if (preferredVoice) return preferredVoice;
  if (!TTS) return null;
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) return null;

  // Preferred high-quality English voices
  const keywords = ["Google US English", "Microsoft Aria", "Microsoft Natural", "David", "Zira", "en-US", "en-GB"];
  for (const kw of keywords) {
    const found = voices.find(v => v.lang.startsWith("en") && v.name.toLowerCase().includes(kw.toLowerCase()));
    if (found) {
      preferredVoice = found;
      return found;
    }
  }
  const enVoice = voices.find(v => v.lang.startsWith("en"));
  if (enVoice) {
    preferredVoice = enVoice;
    return enVoice;
  }
  preferredVoice = voices[0];
  return voices[0];
}

if (TTS && speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => { getBestVoice(); };
}

function speakWebSpeechPromise(text, lang = "en-US") {
  return new Promise((resolve) => {
    if (!TTS) {
      resolve();
      return;
    }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    if (lang.startsWith("en")) {
      const voice = getBestVoice();
      if (voice) {
        u.voice = voice;
        u.lang = voice.lang;
      }
      u.rate = 0.92;
    } else {
      const voices = speechSynthesis.getVoices();
      const viVoice = voices.find(v => v.lang.startsWith("vi"));
      if (viVoice) u.voice = viVoice;
      u.rate = 1.0;
    }
    u.onend = () => resolve();
    u.onerror = () => resolve();
    speechSynthesis.speak(u);
  });
}

let currentPlayingAudio = null;

function speakPromise(text) {
  return new Promise((resolve) => {
    text = text.trim();
    const isSingleWord = /^[a-zA-Z-]+$/.test(text);
    if (isSingleWord) {
      const wordLower = text.toLowerCase();
      const url = `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${wordLower}--_us_1.mp3`;
      const audio = new Audio(url);
      currentPlayingAudio = audio;
      
      let resolved = false;
      const done = () => {
        if (!resolved) {
          resolved = true;
          currentPlayingAudio = null;
          resolve();
        }
      };

      audio.onended = done;
      audio.onerror = () => {
        speakWebSpeechPromise(text).then(done);
      };

      audio.play().catch(() => {
        speakWebSpeechPromise(text).then(done);
      });

      setTimeout(() => {
        if (!resolved) {
          audio.src = "";
          speakWebSpeechPromise(text).then(done);
        }
      }, 3000);
    } else {
      speakWebSpeechPromise(text).then(resolve);
    }
  });
}

function speak(text) {
  speakPromise(text);
}

/* ---------- LISTENING PRACTICE ---------- */
let listenState = {
  playing: false,
  paused: false,
  source: "word", // "word" or "sent"
  mode: "en-vi", // "en", "en-vi", "vi-en"
  order: "seq", // "seq" or "rand"
  interval: 3, // seconds
  index: 0,
  items: [],
  timeoutId: null,
  currentAudio: null
};

function stopListening() {
  listenState.playing = false;
  listenState.paused = false;
  if (listenState.timeoutId) {
    clearTimeout(listenState.timeoutId);
    listenState.timeoutId = null;
  }
  if (currentPlayingAudio) {
    currentPlayingAudio.pause();
    currentPlayingAudio = null;
  }
  if (listenState.currentAudio) {
    listenState.currentAudio.pause();
    listenState.currentAudio = null;
  }
  if (window.speechSynthesis) {
    speechSynthesis.cancel();
  }
}

function isPlaying() {
  return listenState.playing && !listenState.paused && openView === "listen";
}

const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

async function playListenStep() {
  if (!isPlaying()) return;
  if (listenState.items.length === 0) {
    stopListening();
    renderListen();
    toast("Không có dữ liệu để nghe");
    return;
  }
  if (listenState.index >= listenState.items.length || listenState.index < 0) {
    listenState.index = 0;
  }

  const it = listenState.items[listenState.index];
  renderListenActiveCard(it);

  try {
    // 1. Play first speech
    if (listenState.mode === "en" || listenState.mode === "en-vi") {
      await speakPromise(it.word || it.en);
    } else {
      await speakWebSpeechPromise(it.meaning || it.vi, "vi-VN");
    }

    if (!isPlaying()) return;

    // 2. Play translation if bilingual mode
    if (listenState.mode === "en-vi") {
      await delay(800);
      if (!isPlaying()) return;
      await speakWebSpeechPromise(it.meaning || it.vi, "vi-VN");
    } else if (listenState.mode === "vi-en") {
      await delay(800);
      if (!isPlaying()) return;
      await speakPromise(it.word || it.en);
    }

    if (!isPlaying()) return;

    // 3. Wait interval and proceed to next
    listenState.timeoutId = setTimeout(() => {
      if (!isPlaying()) return;
      listenState.index = (listenState.index + 1) % listenState.items.length;
      playListenStep();
    }, listenState.interval * 1000);

  } catch (err) {
    console.error("Listening loop error:", err);
    if (!isPlaying()) return;
    listenState.timeoutId = setTimeout(() => {
      if (!isPlaying()) return;
      listenState.index = (listenState.index + 1) % listenState.items.length;
      playListenStep();
    }, 2000);
  }
}

  openModal(`

      <button class="btn-icon" id="btnListenNext" title="Câu tiếp">⏭️</button>

    </div>
  `);
  bindClose();

  const it = listenState.items[listenState.index];
  if (it) renderListenActiveCard(it);

  const playPauseBtn = $("#btnListenPlayPause");
  playPauseBtn.onclick = () => {
    if (listenState.paused) {
      listenState.paused = false;
      playPauseBtn.textContent = "⏸️";
      playPauseBtn.title = "Tạm dừng";
      toast("Đã tiếp tục phát");
      playListenStep();
    } else {
      listenState.paused = true;
      playPauseBtn.textContent = "▶️";
      playPauseBtn.title = "Tiếp tục phát";
      toast("Đã tạm dừng");
      if (listenState.timeoutId) {
        clearTimeout(listenState.timeoutId);
        listenState.timeoutId = null;
      }
      if (currentPlayingAudio) currentPlayingAudio.pause();
      if (listenState.currentAudio) listenState.currentAudio.pause();
      if (window.speechSynthesis) speechSynthesis.cancel();
    }
  };

  $("#btnListenNext").onclick = () => {
    stopListening();
    listenState.playing = true;
    listenState.index = (listenState.index + 1) % listenState.items.length;
    renderListenPlaying();
    playListenStep();
  };

  $("#btnListenPrev").onclick = () => {
    stopListening();
    listenState.playing = true;
    listenState.index = (listenState.index - 1 + listenState.items.length) % listenState.items.length;
    renderListenPlaying();
    playListenStep();
  };

  $("#btnStopListen").onclick = () => {
    stopListening();
    renderListen();
  };
}

  status.textContent = `Câu ${listenState.index + 1} / ${listenState.items.length} (${listenState.source === "word" ? "Từ vựng" : "Câu dài"})`;

let quiz=null;
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function norm(s){ return (s||"").toLowerCase().trim().replace(/[.,!?;:'"]/g,"").replace(/\s+/g," "); }
function startQuiz(cfg){
  const pool = cfg.src==="word" ? words : sentences;
  const items = shuffle(pool).slice(0, Math.min(10,pool.length));
  quiz={cfg,items,i:0,score:0,wrong:[]};
  nextQuiz();
}
function qPrompt(it,cfg){
  if(cfg.type==="audiomc" || cfg.type==="dictate") return "";
  if(cfg.src==="word") return cfg.dir==="en-vi"?it.word:it.meaning;
  return cfg.dir==="en-vi"?it.en:it.vi;
}
function qAnswer(it,cfg){
  if(cfg.type==="audiomc") return cfg.dir==="en-vi"?it.meaning:it.word;
  if(cfg.type==="dictate") return cfg.src==="word"?it.word:it.en;
  if(cfg.src==="word") return cfg.dir==="en-vi"?it.meaning:it.word;
  return cfg.dir==="en-vi"?it.vi:it.en;
}
function nextQuiz(){
  const {cfg,items,i}=quiz;
  if(i>=items.length) return finishQuiz();
  const it=items[i], prompt=qPrompt(it,cfg), answer=qAnswer(it,cfg);
  
  const head=`<div class="row between"><span class="muted">Câu ${i+1}/${items.length}</span><span class="muted">Điểm: ${quiz.score}</span></div>`;
  
  let promptBox = "";
  if (cfg.type === "audiomc" || cfg.type === "dictate") {
    promptBox = `
      <div class="glass center" style="padding:22px;margin:14px 0">
        <button class="audio-quiz-btn" id="qAudioPlay">🔊</button>
        <div class="muted" style="font-size:13px;">Bấm nút để nghe phát âm</div>
      </div>
    `;
  } else {
    promptBox = `
      <div class="glass center" style="padding:22px;margin:14px 0">
        <div class="big" style="font-size:22px">${esc(prompt)}</div>
      </div>
    `;
  }

  if (cfg.type === "audiomc" || cfg.type === "dictate") {
    setTimeout(() => { speak(cfg.src === "word" ? it.word : it.en); }, 300);
  }

  if (cfg.type === "mc" || cfg.type === "audiomc") {
    let wrongPool = [];
    if (cfg.src === "word") {
      const needEnglish = (cfg.type === "mc" && cfg.dir === "vi-en") || (cfg.type === "audiomc" && cfg.dir === "en-en");
      wrongPool = words.filter(w => w.id !== it.id).map(w => needEnglish ? w.word : w.meaning);
    } else {
      wrongPool = sentences.filter(s => s.id !== it.id).map(s => s.vi);
    }
    const others = shuffle(wrongPool).slice(0, 3);
    const opts = shuffle([answer, ...others]);

    openModal(`
      <button class="close" onclick="window.__close()">×</button>
      <h2>🎯 ${cfg.type === "audiomc" ? "Nghe chọn đáp án" : "Trắc nghiệm"}</h2>
      ${head}
      ${promptBox}
      <div id="opts">
        ${opts.map(o => `<button class="btn ghost" style="width:100%;margin:7px 0;text-align:left" data-opt="${esc(o)}">${esc(o)}</button>`).join("")}
      </div>
    `);
    bindClose();

    if (cfg.type === "audiomc") {
      $("#qAudioPlay").onclick = () => speak(cfg.src === "word" ? it.word : it.en);
    }

    modalBody.querySelectorAll("[data-opt]").forEach(b => b.onclick = () => {
      const ok = b.dataset.opt === answer;
      gradeStep(ok, it, prompt || "[Nghe âm thanh]", b.dataset.opt, answer);
    });

  } else if (cfg.type === "scramble") {
    const correctWords = it.en.trim().replace(/[.,!?;]/g, "").split(/\s+/).filter(w => w.trim().length > 0);
    const initialBlocks = shuffle(correctWords.map((text, index) => ({ text, index })));
    
    quiz.selectedBlocks = [];
    quiz.blocks = initialBlocks;

    const renderScrambleUI = () => {
      const selectedHtml = quiz.selectedBlocks.map(idx => {
        const blk = quiz.blocks.find(b => b.index === idx);
        return `<span class="word-block" data-assembled-idx="${idx}">${esc(blk.text)}</span>`;
      }).join("");

      const remainingHtml = quiz.blocks.map(blk => {
        const isUsed = quiz.selectedBlocks.includes(blk.index);
        return `<button class="word-block ${isUsed ? 'used' : ''}" data-pool-idx="${blk.index}">${esc(blk.text)}</button>`;
      }).join("");

      openModal(`
        <button class="close" onclick="window.__close()">×</button>
        <h2>🔀 Sắp xếp câu</h2>
        ${head}
        <div class="glass center" style="padding:16px;margin:12px 0 6px">
          <div class="big" style="font-size:18px; font-weight:700;">${esc(it.vi)}</div>
        </div>
        <div class="assembly-area" id="scrambleAssembly">
          ${selectedHtml || '<span class="muted" style="font-size:13px;padding:6px 4px;">Click từ ở dưới để xếp thành câu...</span>'}
        </div>
        <div style="margin:12px 0; text-align:center;" id="scramblePool">
          ${remainingHtml}
        </div>
        <div class="row" style="margin-top:14px">
          <button class="btn primary" id="qCheckScramble" ${quiz.selectedBlocks.length === 0 ? 'disabled' : ''}>Kiểm tra</button>
          <button class="btn ghost" id="qResetScramble">Xóa hết</button>
        </div>
      `);
      bindClose();

      modalBody.querySelectorAll("#scramblePool [data-pool-idx]").forEach(btn => {
        btn.onclick = () => {
          const idx = parseInt(btn.dataset.poolIdx);
          if (!quiz.selectedBlocks.includes(idx)) {
            quiz.selectedBlocks.push(idx);
            renderScrambleUI();
          }
        };
      });

      modalBody.querySelectorAll("#scrambleAssembly [data-assembled-idx]").forEach(span => {
        span.onclick = () => {
          const idx = parseInt(span.dataset.assembledIdx);
          quiz.selectedBlocks = quiz.selectedBlocks.filter(x => x !== idx);
          renderScrambleUI();
        };
      });

      $("#qResetScramble").onclick = () => {
        quiz.selectedBlocks = [];
        renderScrambleUI();
      };

      $("#qCheckScramble").onclick = () => {
        const assembledText = quiz.selectedBlocks.map(idx => quiz.blocks.find(b => b.index === idx).text).join(" ");
        const correctText = correctWords.join(" ");
        const isOk = norm(assembledText) === norm(correctText);
        gradeStep(isOk, it, it.vi, assembledText || "(trống)", it.en);
      };
    };

    renderScrambleUI();

  } else {
    openModal(`
      <button class="close" onclick="window.__close()">×</button>
      <h2>✍️ ${cfg.type === "dictate" ? "Nghe viết chính tả" : "Điền từ"}</h2>
      ${head}
      ${promptBox}
      <input id="qIn" placeholder="Nhập đáp án..." autocomplete="off" autocorrect="off" autocapitalize="off">
      <div class="row" style="margin-top:14px">
        <button class="btn primary" id="qOk">Kiểm tra</button>
      </div>
    `);
    bindClose();

    if (cfg.type === "dictate") {
      $("#qAudioPlay").onclick = () => speak(cfg.src === "word" ? it.word : it.en);
    }

    const submit = () => {
      const val = $("#qIn").value;
      gradeStep(norm(val) === norm(answer), it, prompt || "[Nghe âm thanh]", val, answer);
    };
    $("#qOk").onclick = submit;
    $("#qIn").addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    $("#qIn").focus();
  }

  modalBody.querySelectorAll("[data-say]").forEach(b => { 
    if (b.id !== "qAudioPlay") {
      b.onclick = () => speak(b.dataset.say); 
    }
  });
}
function gradeStep(ok,it,prompt,given,answer){
  if(ok) quiz.score++; else quiz.wrong.push({prompt,given:given||"(trống)",answer});
  const fb=`<div class="glass center" style="padding:18px;margin:14px 0">
      <div class="${ok?'res-good':'res-bad'}" style="font-size:20px">${ok?"✓ Chính xác!":"✗ Chưa đúng"}</div>
      ${ok?"":`<div style="margin-top:8px">Đáp án: <b>${esc(answer)}</b></div>`}
    </div>
    <button class="btn primary" id="qNext" style="width:100%">${quiz.i+1>=quiz.items.length?"Xem kết quả":"Câu tiếp →"}</button>`;
  openModal(`<button class="close" onclick="window.__close()">×</button><h2>🎯 Kiểm tra</h2>${fb}`);
  bindClose();
  $("#qNext").onclick=()=>{ quiz.i++; nextQuiz(); };
}

    const newWater = (gardenState.waterCount || 0) + 1;
    updateDoc(doc(db, "garden", "state"), {
      waterCount: newWater,
      updatedAt: serverTimestamp()
    }).then(() => {
      toast("🎉 Nhận được 1 💧 nước tưới cây phượng!");
    }).catch(err => console.error("Error rewarding water:", err));

  const total=quiz.items.length, pct=Math.round(quiz.score/total*100);

      <div style="margin-top:10px; font-size:14px; font-weight:700; color:var(--accent);">🎁 Thưởng: +1 💧 Nước tưới cây</div>
    </div>
    ${quiz.wrong.length?`<h3>Câu sai (${quiz.wrong.length})</h3><div class="scroll">${wrong}</div>`:`<p class="center res-good">Tuyệt vời, không sai câu nào!</p>`}
    <div class="row" style="margin-top:16px"><button class="btn primary" onclick="window.__back('quiz')">Làm lại</button><button class="btn ghost" onclick="window.__close()">Đóng</button></div>`);
  bindClose();
}

/* ---------- LOVE GARDEN ---------- */
let gardenAnimId = null;
let mascotAnimId = null;
let mascotDrag = { active: false, startX: 0, startY: 0, elemX: 0, elemY: 0 };

function getLocalDateStr(date = new Date()) {
  const offset = date.getTimezoneOffset();
  const localDate = new Date(date.getTime() - (offset * 60 * 1000));
  return localDate.toISOString().split('T')[0];
}

function getDaysBetween(dateStr1, dateStr2) {
  if (!dateStr1 || !dateStr2) return 999;
  const d1 = new Date(dateStr1 + 'T00:00:00');
  const d2 = new Date(dateStr2 + 'T00:00:00');
  const diffTime = d2 - d1;
  if (diffTime <= 0) return 0;
  return Math.round(diffTime / (1000 * 60 * 60 * 24));
}

async function verifyGardenStateLocally() {
  if (!gardenState) return;
  const todayStr = getLocalDateStr();
  const lastWatered = gardenState.lastWateredDate;
  
  let calculatedState = "healthy";
  if (!lastWatered) {
    calculatedState = "dead";
  } else {
    const diff = getDaysBetween(lastWatered, todayStr);
    if (diff === 0) {
      calculatedState = "healthy";
    } else if (diff === 1) {
      calculatedState = "wilted";
    } else {
      calculatedState = "dead";
    }
  }
  
  let needsUpdate = false;
  const updates = {};
  
  if (gardenState.treeState !== calculatedState) {
    updates.treeState = calculatedState;
    needsUpdate = true;
  }
  
  if (lastWatered) {
    const diff = getDaysBetween(lastWatered, todayStr);
    if (diff >= 2 && gardenState.streak > 0) {
      updates.streak = 0;
      needsUpdate = true;
    }
  }
  
  if (needsUpdate) {
    try {
      await updateDoc(doc(db, "garden", "state"), updates);
    } catch (err) {
      console.error("Error updating garden state:", err);
    }
  }
}

function startGardenAnimation(canvas, ctx, treeImgSrc) {
  if (gardenAnimId) {
    cancelAnimationFrame(gardenAnimId);
  }
  
  const offscreenCanvas = document.createElement("canvas");
  const offCtx = offscreenCanvas.getContext("2d");
  
  const img = new Image();
  img.onload = () => {
    offscreenCanvas.width = img.width;
    offscreenCanvas.height = img.height;
    offCtx.drawImage(img, 0, 0);
    
    canvas.width = img.width;
    canvas.height = img.height;
    
    const particles = [];
    const isDead = gardenState && gardenState.treeState === "dead";
    const maxParticles = isDead ? 0 : 35;
    
    for (let i = 0; i < maxParticles; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * (canvas.height - 40),
        r: Math.random() * 3 + 2,
        d: Math.random() * maxParticles,
        color: Math.random() > 0.3 ? "#f43f5e" : "#fb7185",
        speedY: Math.random() * 1.2 + 0.6,
        speedX: Math.random() * 0.8 - 0.2
      });
    }
    
    let time = 0;
    const tick = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 0.01;
      
      ctx.save();
      const originX = canvas.width / 2;
      const originY = canvas.height - 20;
      ctx.translate(originX, originY);
      
      const swayAngle = Math.sin(time * 1.5) * 0.018 + Math.cos(time * 0.5) * 0.005;
      ctx.rotate(swayAngle);
      
      const skewX = Math.sin(time * 1.2) * 0.01;
      ctx.transform(1, 0, skewX, 1, 0, 0);
      
      ctx.drawImage(offscreenCanvas, -originX, -originY);
      ctx.restore();
      
      if (particles.length > 0) {
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          
          p.y += p.speedY;
          p.x += p.speedX + Math.sin(time * 2 + p.d) * 0.3;
          
          if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
          }
          if (p.x > canvas.width || p.x < 0) {
            p.x = Math.random() * canvas.width;
          }
        });
      }
      
      gardenAnimId = requestAnimationFrame(tick);
    };
    tick();
  };
  img.src = treeImgSrc;
}

function initMascotDraggable(el) {
  const onStart = (e) => {
    mascotDrag.active = true;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const rect = el.getBoundingClientRect();
    mascotDrag.startX = clientX;
    mascotDrag.startY = clientY;
    mascotDrag.elemX = rect.left;
    mascotDrag.elemY = rect.top;
    
    el.style.transition = "none";
  };
  
  const onMove = (e) => {
    if (!mascotDrag.active) return;
    if (e.touches) {
      if (e.cancelable) e.preventDefault();
    }
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const dx = clientX - mascotDrag.startX;
    const dy = clientY - mascotDrag.startY;
    
    let newLeft = mascotDrag.elemX + dx;
    let newTop = mascotDrag.elemY + dy;
    
    const rect = el.getBoundingClientRect();
    const maxX = window.innerWidth - rect.width;
    const maxY = window.innerHeight - rect.height;
    
    newLeft = Math.max(0, Math.min(newLeft, maxX));
    newTop = Math.max(0, Math.min(newTop, maxY));
    
    el.style.left = newLeft + "px";
    el.style.top = newTop + "px";
    el.style.bottom = "auto";
    el.style.right = "auto";
  };
  
  const onEnd = () => {
    if (!mascotDrag.active) return;
    mascotDrag.active = false;
    el.style.transition = "transform 0.1s ease";
    
    localStorage.setItem("mascotX", el.style.left);
    localStorage.setItem("mascotY", el.style.top);
  };
  
  el.addEventListener("mousedown", onStart);
  el.addEventListener("touchstart", onStart, { passive: true });
  
  window.addEventListener("mousemove", onMove);
  window.addEventListener("touchmove", onMove, { passive: false });
  
  window.addEventListener("mouseup", onEnd);
  window.addEventListener("touchend", onEnd);
}

function updateMascotState() {
  const isShow = localStorage.getItem("showMascot") !== "false";
  if (isShow) {
    let widget = document.getElementById("mascotWidget");
    if (!widget) {
      widget = document.createElement("div");
      widget.id = "mascotWidget";
      widget.className = "mascot-widget";
      widget.innerHTML = `<canvas id="mascotCanvas"></canvas>`;
      document.body.appendChild(widget);
      
      const savedX = localStorage.getItem("mascotX");
      const savedY = localStorage.getItem("mascotY");
      if (savedX && savedY) {
        widget.style.left = savedX;
        widget.style.top = savedY;
      } else {
        widget.style.right = "24px";
        widget.style.bottom = "120px";
      }
      
      initMascotDraggable(widget);
    }
    widget.style.display = "block";
    
    const canvas = document.getElementById("mascotCanvas");
    if (canvas && gardenState) {
      const ctx = canvas.getContext("2d");
      const state = gardenState.treeState || "healthy";
      const imgName = `tree_${state}.png`;
      
      if (mascotAnimId) cancelAnimationFrame(mascotAnimId);
      
      const offCanvas = document.createElement("canvas");
      const offCtx = offCanvas.getContext("2d");
      
      const img = new Image();
      img.onload = () => {
        offCanvas.width = img.width;
        offCanvas.height = img.height;
        offCtx.drawImage(img, 0, 0);
        
        canvas.width = img.width;
        canvas.height = img.height;
        
        const particles = [];
        const isDead = state === "dead";
        const maxParticles = isDead ? 0 : 15;
        for (let i = 0; i < maxParticles; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * (canvas.height - 40),
            r: Math.random() * 2 + 1.5,
            d: Math.random() * maxParticles,
            color: Math.random() > 0.3 ? "#f43f5e" : "#fb7185",
            speedY: Math.random() * 1.0 + 0.5,
            speedX: Math.random() * 0.6 - 0.2
          });
        }
        
        let time = 0;
        const tick = () => {
          if (widget.style.display === "none") return;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          time += 0.012;
          
          ctx.save();
          const originX = canvas.width / 2;
          const originY = canvas.height - 20;
          ctx.translate(originX, originY);
          
          const swayAngle = Math.sin(time * 1.6) * 0.02 + Math.cos(time * 0.6) * 0.005;
          ctx.rotate(swayAngle);
          
          const skewX = Math.sin(time * 1.3) * 0.012;
          ctx.transform(1, 0, skewX, 1, 0, 0);
          
          ctx.drawImage(offCanvas, -originX, -originY);
          ctx.restore();
          
          if (particles.length > 0) {
            particles.forEach(p => {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = p.color;
              ctx.fill();
              
              p.y += p.speedY;
              p.x += p.speedX + Math.sin(time * 2 + p.d) * 0.2;
              
              if (p.y > canvas.height) {
                p.y = -10;
                p.x = Math.random() * canvas.width;
              }
              if (p.x > canvas.width || p.x < 0) {
                p.x = Math.random() * canvas.width;
              }
            });
          }
          mascotAnimId = requestAnimationFrame(tick);
        };
        tick();
      };
      img.src = imgName;
    }
  } else {
    const widget = document.getElementById("mascotWidget");
    if (widget) {
      widget.style.display = "none";
    }
    if (mascotAnimId) {
      cancelAnimationFrame(mascotAnimId);
      mascotAnimId = null;
    }
  }
}

function renderGarden() {
  if (!gardenState) {
    openModal(`
      <button class="close" onclick="window.__close()">×</button>
      <h2>🌸 Love Garden</h2>
      <div class="center muted" style="padding: 24px;">Đang tải vườn cây...</div>
    `);
    bindClose();
    return;
  }
  
  const water = gardenState.waterCount || 0;
  const streak = gardenState.streak || 0;
  const state = gardenState.treeState || "healthy";
  
  let stateLabel = "Tươi tốt 💖";
  let stateDesc = "Cây phượng đang nở hoa rực rỡ! Hãy tiếp tục chăm sóc cây nhé.";
  let treeImg = "tree_healthy.png";
  let cardBorderColor = "var(--good)";
  
  if (state === "wilted") {
    stateLabel = "Héo úa 🍂";
    stateDesc = "Cây phượng đã 1 ngày chưa được tưới nước nên hơi héo. Hãy tưới ngay!";
    treeImg = "tree_wilted.png";
    cardBorderColor = "var(--accent-2)";
  } else if (state === "dead") {
    stateLabel = "Trơ trụi 🪵";
    stateDesc = "Cây phượng đã bị khô héo rụng hết hoa lá do 2 ngày chưa tưới. Hãy tưới nước để hồi sinh cây!";
    treeImg = "tree_dead.png";
    cardBorderColor = "var(--muted)";
  }
  
  openModal(`
    <button class="close" onclick="window.__close()">×</button>
    <div class="center">
      <h2>🌸 Love Garden</h2>
      <p class="muted" style="font-size:13px;margin:4px 0 14px;">Khu vườn nhỏ trồng cây phượng tình yêu của chúng ta</p>
    </div>
    
    <div class="glass center" style="padding: 10px; position: relative; overflow: hidden; background: #fff; border: 1px solid var(--border-soft); margin-bottom: 14px;">
      <canvas id="gardenCanvas" style="max-width: 100%; height: auto; display: block; margin: 0 auto; background: transparent;"></canvas>
    </div>
    
    <div class="glass" style="padding: 14px 18px; margin-bottom: 14px; border-left: 5px solid ${cardBorderColor};">
      <div class="row between" style="margin-bottom: 6px;">
        <span style="font-weight:700; font-size:16px; color:var(--text);">${stateLabel}</span>
        <span style="font-size:13px; font-weight:700; color:var(--accent);">🔥 Chuỗi: ${streak} ngày</span>
      </div>
      <p style="margin: 0; font-size: 13.5px; line-height: 1.4; color: var(--muted);">${stateDesc}</p>
    </div>
    
    <div class="grid2" style="margin-bottom: 14px;">
      <div class="glass center" style="padding: 12px;">
        <div class="muted" style="font-size: 11px; font-weight: 700; text-transform: uppercase;">Nước hiện có</div>
        <div style="font-size: 26px; font-weight: 800; color: var(--text); margin-top: 4px;">${water} 💧</div>
      </div>
      <div class="glass center" style="padding: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <button class="btn primary" id="btnWaterTree" ${water <= 0 ? 'disabled style="opacity: 0.6; cursor: not-allowed;"' : ''} style="width: 100%; padding: 10px 0; font-size:14px;">
          💧 Tưới nước
        </button>
      </div>
    </div>
    
    <div class="glass" style="padding: 12px 14px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; background: #fff;">
      <div style="text-align: left;">
        <span style="font-weight:700; font-size:13.5px; color:var(--text); display:block;">
          🔮 Linh vật phượng ngoài màn hình
        </span>
        <span style="font-size:10.5px; color:var(--muted); display:block; margin-top:2px;">
          (Nhấp giữ/chạm để di chuyển ngoài màn hình chính)
        </span>
      </div>
      <button class="btn sm" id="btnToggleMascot" style="padding: 6px 12px; font-size:12px; font-weight:700; border-radius:10px;"></button>
    </div>
    
    <div class="glass" style="padding: 12px 14px; text-align: center; font-size: 12.5px; color: var(--muted); line-height: 1.4;">
      💡 <i>Làm bài <b>Kiểm tra</b> để nhận thêm nước 💧 (Mỗi ngày tưới 1 lần để giữ cây luôn xanh tươi).</i>
    </div>
  `);
  bindClose();
  
  const canvas = document.getElementById("gardenCanvas");
  if (canvas) {
    const ctx = canvas.getContext("2d");
    startGardenAnimation(canvas, ctx, treeImg);
  }
  
  const btnMascot = document.getElementById("btnToggleMascot");
  if (btnMascot) {
    const isMascotEnabled = localStorage.getItem("showMascot") !== "false";
    btnMascot.textContent = isMascotEnabled ? "Đang bật (Tắt)" : "Đang tắt (Bật)";
    btnMascot.className = isMascotEnabled ? "btn sm primary" : "btn sm ghost";
    
    btnMascot.onclick = () => {
      const currentlyEnabled = localStorage.getItem("showMascot") !== "false";
      localStorage.setItem("showMascot", currentlyEnabled ? "false" : "true");
      updateMascotState();
      
      const nowEnabled = !currentlyEnabled;
      btnMascot.textContent = nowEnabled ? "Đang bật (Tắt)" : "Đang tắt (Bật)";
      btnMascot.className = nowEnabled ? "btn sm primary" : "btn sm ghost";
      toast(nowEnabled ? "Đã hiện linh vật trên màn hình chính" : "Đã ẩn linh vật");
    };
  }
  
  const btnWater = document.getElementById("btnWaterTree");
  if (btnWater) {
    btnWater.onclick = async () => {
      if (!gardenState || (gardenState.waterCount || 0) <= 0) return;
      
      const todayStr = getLocalDateStr();
      const lastWatered = gardenState.lastWateredDate;
      
      let newStreak = gardenState.streak || 0;
      if (lastWatered) {
        const diff = getDaysBetween(lastWatered, todayStr);
        if (diff === 1) {
          newStreak += 1;
        } else if (diff === 0) {
          toast("Hôm nay em đã tưới nước rồi mà! Cảm ơn em bé nhé 💖");
          return;
        } else {
          newStreak = 1;
        }
      } else {
        newStreak = 1;
      }
      
      const updates = {
        waterCount: gardenState.waterCount - 1,
        lastWateredDate: todayStr,
        treeState: "healthy",
        streak: newStreak,
        updatedAt: serverTimestamp()
      };
      
      try {
        btnWater.disabled = true;
        await updateDoc(doc(db, "garden", "state"), updates);
        toast("💖 Cây phượng đã được tưới nước xanh tươi! Chuỗi: " + newStreak + " ngày");
      } catch (err) {
        console.error("Error watering tree:", err);
        toast("Có lỗi xảy ra khi tưới cây");
        btnWater.disabled = false;
      }
    };
  }
}

/* ---------- modal global helpers ---------- */
window.__close=closeModal;
window.__back=(v)=>{
  if (typeof stopListening === "function") stopListening();
  if (gardenAnimId) {
    cancelAnimationFrame(gardenAnimId);
    gardenAnimId = null;
  }
  openView=v;
  render();
};
function bindClose(){ const c=modalBody.querySelector(".close"); if(c) c.onclick=closeModal; }
window.addEventListener("resize", () => {
  if (typeof updateMascotState === "function") updateMascotState();
});
