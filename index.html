<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>English — Tặng em bé của anh</title>
<style>
  :root{
    --bg1:#1b2a4a; --bg2:#3a1d5c; --bg3:#0f2e3e;
    --glass: rgba(255,255,255,0.12);
    --glass-strong: rgba(255,255,255,0.18);
    --border: rgba(255,255,255,0.25);
    --text:#f4f6ff; --muted:rgba(244,246,255,0.7);
    --accent:#ff7eb3; --accent2:#7ee8fa; --good:#5ee0a0; --bad:#ff7a7a;
    --radius:22px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    background-attachment:fixed;
    min-height:100vh;
    overflow-x:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(40% 30% at 15% 12%, rgba(255,126,179,0.25), transparent 60%),
      radial-gradient(45% 35% at 85% 20%, rgba(126,232,250,0.22), transparent 60%),
      radial-gradient(50% 40% at 50% 95%, rgba(150,120,255,0.20), transparent 60%);
  }
  .app{max-width:680px;margin:0 auto;padding:18px 16px 110px;}
  header{text-align:center;margin:8px 0 18px;}
  header h1{font-size:26px;margin:0;font-weight:800;letter-spacing:.3px;
    background:linear-gradient(90deg,var(--accent2),var(--accent));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .gift{font-size:12px;font-style:italic;color:var(--muted);margin-top:4px;}
  .sync{font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:6px;justify-content:center;align-items:center;}
  .dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;}
  .dot.on{background:var(--good);box-shadow:0 0 8px var(--good);}
  .dot.off{background:var(--bad);}

  .glass{
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:var(--radius);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
  }

  /* Tab grid */
  .tabs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
  .tab{
    padding:22px 16px;text-align:center;cursor:pointer;
    transition:transform .15s ease, background .2s;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .tab:active{transform:scale(.96);}
  .tab .ic{font-size:30px;}
  .tab .nm{font-weight:700;font-size:16px;}
  .tab .sub{font-size:11px;color:var(--muted);}

  /* Buttons */
  button{font-family:inherit;color:var(--text);cursor:pointer;border:none;}
  .btn{
    background:var(--glass-strong);border:1px solid var(--border);
    border-radius:14px;padding:11px 16px;font-size:15px;font-weight:600;
    backdrop-filter:blur(10px);transition:transform .12s, background .2s;
  }
  .btn:active{transform:scale(.95);}
  .btn.primary{background:linear-gradient(90deg,var(--accent),#ff5e9c);border:none;}
  .btn.cyan{background:linear-gradient(90deg,var(--accent2),#3fc7e0);border:none;color:#06303a;}
  .btn.ghost{background:rgba(255,255,255,0.06);}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:11px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .row.between{justify-content:space-between;align-items:center;}

  input,select,textarea{
    width:100%;font-family:inherit;font-size:15px;color:var(--text);
    background:rgba(255,255,255,0.10);border:1px solid var(--border);
    border-radius:12px;padding:11px 13px;outline:none;
  }
  input::placeholder,textarea::placeholder{color:rgba(244,246,255,0.45);}
  select option{color:#111;}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 5px;}

  /* Modal */
  .overlay{
    position:fixed;inset:0;z-index:50;display:none;
    align-items:center;justify-content:center;padding:18px;
    background:rgba(8,10,25,0.55);backdrop-filter:blur(6px);
    animation:fade .2s ease;
  }
  .overlay.show{display:flex;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    width:100%;max-width:560px;max-height:86vh;overflow:auto;
    padding:20px;animation:pop .25s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}
  .modal h2{margin:0 0 4px;font-size:20px;}
  .modal .close{position:sticky;top:0;float:right;font-size:22px;line-height:1;
    background:transparent;border:none;color:var(--muted);padding:2px 6px;margin:-6px -6px 0 0;}

  /* List items */
  .item{
    padding:13px 15px;margin:10px 0;border-radius:16px;
    background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .item .w{font-weight:700;font-size:16px;}
  .item .ipa{color:var(--accent2);font-size:13px;}
  .item .mean{color:var(--muted);font-size:14px;}
  .item .acts{display:flex;gap:6px;flex-shrink:0;}
  .iconbtn{background:rgba(255,255,255,0.10);border:1px solid var(--border);
    border-radius:10px;width:36px;height:36px;font-size:16px;display:flex;align-items:center;justify-content:center;}

  .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;
    background:rgba(255,255,255,0.12);border:1px solid var(--border);margin:0 6px 6px 0;cursor:pointer;}
  .pill.active{background:linear-gradient(90deg,var(--accent2),var(--accent));color:#06303a;font-weight:700;}

  .count{font-size:13px;color:var(--muted);}
  .center{text-align:center;}
  .big{font-size:28px;font-weight:800;margin:10px 0;}
  .muted{color:var(--muted);}
  .hidden{display:none!important;}
  .scroll{max-height:58vh;overflow:auto;margin-top:8px;}
  .field{margin-bottom:6px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .res-good{color:var(--good);font-weight:700;}
  .res-bad{color:var(--bad);font-weight:700;}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);
    background:rgba(20,22,40,0.9);border:1px solid var(--border);padding:11px 18px;
    border-radius:14px;font-size:14px;z-index:99;opacity:0;transition:opacity .25s;backdrop-filter:blur(10px);}
  .toast.show{opacity:1;}
  .speak{cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>English Garden</h1>
    <div class="gift">Tặng em bé của anh 💛</div>
    <div class="sync"><span id="syncDot" class="dot"></span><span id="syncText">Đang kết nối…</span></div>
  </header>

  <div class="tabs">
    <div class="tab glass" data-open="vocab"><div class="ic">📚</div><div class="nm">Từ vựng</div><div class="sub" id="cntVocab">0 từ</div></div>
    <div class="tab glass" data-open="sentences"><div class="ic">📝</div><div class="nm">Câu dài</div><div class="sub" id="cntSent">0 câu</div></div>
    <div class="tab glass" data-open="quiz"><div class="ic">🎯</div><div class="nm">Kiểm tra</div><div class="sub">Trắc nghiệm & điền từ</div></div>
    <div class="tab glass" data-open="pron"><div class="ic">🔊</div><div class="nm">Phát âm</div><div class="sub">Chuẩn IPA</div></div>
  </div>

  <div class="glass" style="padding:16px;">
    <div class="row between">
      <span class="count">☁️ Dữ liệu đồng bộ qua Firebase</span>
      <button class="btn sm ghost" id="btnBackup">Sao lưu JSON</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal glass" id="modal">
    <button class="close" id="modalClose">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ---------- DOM helpers ---------- */
const $ = (s)=>document.querySelector(s);
const overlay=$("#overlay"), modalBody=$("#modalBody");
function openModal(html){ modalBody.innerHTML=html; overlay.classList.add("show"); }
function closeModal(){ overlay.classList.remove("show"); }
$("#modalClose").onclick=closeModal;
overlay.addEventListener("click",e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });
function esc(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
let toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1800); }

/* ---------- Text-to-speech ---------- */
const TTS = "speechSynthesis" in window;
function speak(text){
  if(!TTS) return toast("Thiết bị không hỗ trợ phát âm");
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.92;
  speechSynthesis.speak(u);
}

/* ---------- Firestore sync ---------- */
function setOnline(on){
  online=on;
  $("#syncDot").className="dot "+(on?"on":"off");
  $("#syncText").textContent = on ? "Đã đồng bộ" : "Offline (sẽ tự đồng bộ)";
}
onSnapshot(wordsCol, snap=>{
  setOnline(!snap.metadata.fromCache);

  words.sort((a,b)=>(a.word||"").localeCompare(b.word||""));
  $("#cntVocab").textContent = words.length+" từ";
  if(words.length===0 && !snap.metadata.fromCache) seedWords();
  refreshOpen();
}, err=>{ console.error(err); setOnline(false); });

onSnapshot(sentCol, snap=>{
  sentences = snap.docs.map(d=>({id:d.id, ...d.data()}));
  $("#cntSent").textContent = sentences.length+" câu";
  if(sentences.length===0 && !snap.metadata.fromCache) seedSentences();
  refreshOpen();
});

async function seedWords(){
  const batch=writeBatch(db);
  SEED.forEach(([word,ipa,meaning,topic])=>{
    batch.set(doc(wordsCol), {word,ipa,meaning,topic,example:"",createdAt:serverTimestamp()});
  });
  await batch.commit();
  toast("Đã nạp "+SEED.length+" từ vựng mẫu");
}
async function seedSentences(){
  const batch=writeBatch(db);
  SEED_SENTENCES.forEach(([en,vi])=>batch.set(doc(sentCol),{en,vi,createdAt:serverTimestamp()}));
  await batch.commit();
}

/* CRUD */
const addWord=(d)=>addDoc(wordsCol,{...d,createdAt:serverTimestamp()});
const updWord=(id,d)=>updateDoc(doc(db,"words",id),d);
const delWord=(id)=>deleteDoc(doc(db,"words",id));
const addSent=(d)=>addDoc(sentCol,{...d,createdAt:serverTimestamp()});
const updSent=(id,d)=>updateDoc(doc(db,"sentences",id),d);
const delSent=(id)=>deleteDoc(doc(db,"sentences",id));

/* ---------- Open tabs ---------- */
let openView=null;
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>open(t.dataset.open));
function open(view){ openView=view; render(); overlay.classList.add("show"); }
function refreshOpen(){ if(overlay.classList.contains("show") && openView) render(); }
function render(){
  if(openView==="vocab") renderVocab();
  else if(openView==="sentences") renderSentences();
  else if(openView==="quiz") renderQuizHome();
  else if(openView==="pron") renderPron();
}

/* ---------- VOCAB ---------- */
let vocabFilter="all", vocabSearch="";
function topics(){ return ["all", ...Array.from(new Set(words.map(w=>w.topic||"other")))]; }
const TOPIC_LABEL={all:"Tất cả",nature:"Thiên nhiên",life:"Cuộc sống",other:"Khác"};
function renderVocab(){
  let list=words.filter(w=>vocabFilter==="all"||w.topic===vocabFilter);
  if(vocabSearch){ const q=vocabSearch.toLowerCase();
    list=list.filter(w=>(w.word||"").toLowerCase().includes(q)||(w.meaning||"").toLowerCase().includes(q)); }
  const pills=topics().map(t=>`<span class="pill ${t===vocabFilter?'active':''}" data-topic="${t}">${TOPIC_LABEL[t]||t}</span>`).join("");
  const items=list.map(w=>`
    <div class="item">
      <div style="min-width:0">
        <div class="w">${esc(w.word)} <span class="speak" data-say="${esc(w.word)}">🔊</span></div>
        <div class="ipa">${esc(w.ipa||"")}</div>
        <div class="mean">${esc(w.meaning||"")}</div>
        ${w.example?`<div class="muted" style="font-size:12px;margin-top:3px">“${esc(w.example)}”</div>`:""}
      </div>
      <div class="acts">
        <button class="iconbtn" data-edit="${w.id}">✏️</button>
        <button class="iconbtn" data-del="${w.id}">🗑️</button>
      </div>
    </div>`).join("") || `<div class="center muted" style="padding:24px">Không có từ nào.</div>`;
  openModal(`
    <button class="close" onclick="window.__close()">×</button>
    <h2>📚 Từ vựng</h2>
    <div class="count">${list.length}/${words.length} từ</div>
    <div style="margin:12px 0"><input id="vSearch" placeholder="🔍 Tìm từ hoặc nghĩa…" value="${esc(vocabSearch)}"></div>
    <div>${pills}</div>
    <div class="row" style="margin-top:10px"><button class="btn primary sm" id="vAdd">＋ Thêm từ</button></div>
    <div class="scroll" id="vList">${items}</div>
  `);
  bindClose();
  $("#vSearch").oninput=e=>{ vocabSearch=e.target.value; const p=$("#vSearch").selectionStart; renderVocab(); const el=$("#vSearch"); el.focus(); el.setSelectionRange(p,p); };
  modalBody.querySelectorAll(".pill").forEach(p=>p.onclick=()=>{vocabFilter=p.dataset.topic;renderVocab();});
  modalBody.querySelectorAll("[data-say]").forEach(b=>b.onclick=()=>speak(b.dataset.say));
  modalBody.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ if(confirm("Xóa từ này?")) delWord(b.dataset.del); });
  modalBody.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>wordForm(words.find(w=>w.id===b.dataset.edit)));
  $("#vAdd").onclick=()=>wordForm(null);
}
function wordForm(w){
  const e=w||{word:"",ipa:"",meaning:"",example:"",topic:"life"};
  openModal(`
    <button class="close" onclick="window.__close()">×</button>
    <h2>${w?"✏️ Sửa từ":"＋ Thêm từ"}</h2>
    <label>Từ tiếng Anh</label><input id="fw" value="${esc(e.word)}">
    <label>Phiên âm IPA</label><input id="fi" value="${esc(e.ipa)}" placeholder="/ˈeksɑːmpl/">
    <label>Nghĩa tiếng Việt</label><input id="fm" value="${esc(e.meaning)}">
    <label>Ví dụ (tùy chọn)</label><input id="fe" value="${esc(e.example||"")}">
    <label>Chủ đề</label>
    <select id="ft">
      <option value="life" ${e.topic==="life"?"selected":""}>Cuộc sống</option>
      <option value="nature" ${e.topic==="nature"?"selected":""}>Thiên nhiên</option>
      <option value="other" ${e.topic==="other"?"selected":""}>Khác</option>
    </select>
    <div class="row" style="margin-top:16px">
      <button class="btn primary" id="fSave">Lưu</button>
      <button class="btn ghost" onclick="window.__back('vocab')">Hủy</button>
    </div>
  `);
  bindClose();
  $("#fSave").onclick=async()=>{
    const data={word:$("#fw").value.trim(),ipa:$("#fi").value.trim(),meaning:$("#fm").value.trim(),example:$("#fe").value.trim(),topic:$("#ft").value};
    if(!data.word||!data.meaning) return toast("Nhập từ và nghĩa");
    if(w) await updWord(w.id,data); else await addWord(data);
    toast(w?"Đã cập nhật":"Đã thêm từ"); renderVocab();
  };
}

/* ---------- SENTENCES ---------- */
function renderSentences(){
  const items=sentences.map(s=>`
    <div class="item">
      <div style="min-width:0">
        <div class="w">${esc(s.en)} <span class="speak" data-say="${esc(s.en)}">🔊</span></div>
        <div class="mean">${esc(s.vi)}</div>
      </div>
      <div class="acts">
        <button class="iconbtn" data-edit="${s.id}">✏️</button>
        <button class="iconbtn" data-del="${s.id}">🗑️</button>
      </div>
    </div>`).join("") || `<div class="center muted" style="padding:24px">Chưa có câu nào.</div>`;
  openModal(`
    <button class="close" onclick="window.__close()">×</button>
    <h2>📝 Câu dài</h2>
    <div class="count">${sentences.length} câu</div>
    <div class="row" style="margin:12px 0">
      <button class="btn primary sm" id="sAdd">＋ Thêm câu</button>
      <button class="btn cyan sm" id="sTestEV">Test Anh→Việt</button>
      <button class="btn cyan sm" id="sTestVE">Test Việt→Anh</button>
    </div>
    <div class="scroll">${items}</div>
  `);
  bindClose();
  modalBody.querySelectorAll("[data-say]").forEach(b=>b.onclick=()=>speak(b.dataset.say));
  modalBody.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ if(confirm("Xóa câu này?")) delSent(b.dataset.del); });
  modalBody.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>sentForm(sentences.find(s=>s.id===b.dataset.edit)));
  $("#sAdd").onclick=()=>sentForm(null);
  $("#sTestEV").onclick=()=>{ if(sentences.length<1)return toast("Cần ít nhất 1 câu"); startQuiz({src:"sent",dir:"en-vi",type:"fill"}); };
  $("#sTestVE").onclick=()=>{ if(sentences.length<1)return toast("Cần ít nhất 1 câu"); startQuiz({src:"sent",dir:"vi-en",type:"fill"}); };
}
function sentForm(s){
  const e=s||{en:"",vi:""};
  openModal(`
    <button class="close" onclick="window.__close()">×</button>
    <h2>${s?"✏️ Sửa câu":"＋ Thêm câu"}</h2>
    <label>Câu tiếng Anh</label><textarea id="se" rows="2">${esc(e.en)}</textarea>
    <label>Câu tiếng Việt</label><textarea id="sv" rows="2">${esc(e.vi)}</textarea>
    <div class="row" style="margin-top:16px">
      <button class="btn primary" id="sSave">Lưu</button>
      <button class="btn ghost" onclick="window.__back('sentences')">Hủy</button>
    </div>
  `);
  bindClose();
  $("#sSave").onclick=async()=>{
    const data={en:$("#se").value.trim(),vi:$("#sv").value.trim()};
    if(!data.en||!data.vi) return toast("Nhập cả hai câu");
    if(s) await updSent(s.id,data); else await addSent(data);
    toast(s?"Đã cập nhật":"Đã thêm câu"); renderSentences();
  };
}

/* ---------- PRONUNCIATION ---------- */
let pronIdx=0;
function renderPron(){
  if(words.length===0){ openModal(`<button class="close" onclick="window.__close()">×</button><h2>🔊 Phát âm</h2><p class="muted center" style="padding:24px">Chưa có từ vựng.</p>`); bindClose(); return; }
  if(pronIdx>=words.length) pronIdx=0;
  const w=words[pronIdx];
  openModal(`
    <button class="close" onclick="window.__close()">×</button>
    <h2>🔊 Phát âm chuẩn IPA</h2>
    <div class="glass center" style="padding:28px 18px;margin-top:14px">
      <div class="big">${esc(w.word)}</div>
      <div style="color:var(--accent2);font-size:20px;margin:6px 0">${esc(w.ipa||"—")}</div>
      <div class="muted">${esc(w.meaning||"")}</div>
      <button class="btn cyan" style="margin-top:16px" id="pSay">🔊 Nghe phát âm</button>
    </div>
    <div class="row between" style="margin-top:16px">
      <button class="btn ghost" id="pPrev">← Trước</button>
      <span class="muted">${pronIdx+1}/${words.length}</span>
      <button class="btn ghost" id="pNext">Sau →</button>
    </div>
  `);
  bindClose();
  $("#pSay").onclick=()=>speak(w.word);
  $("#pPrev").onclick=()=>{ pronIdx=(pronIdx-1+words.length)%words.length; renderPron(); };
  $("#pNext").onclick=()=>{ pronIdx=(pronIdx+1)%words.length; renderPron(); };
  speak(w.word);
}

/* ---------- QUIZ ---------- */
function renderQuizHome(){
  openModal(`
    <button class="close" onclick="window.__close()">×</button>
    <h2>🎯 Kiểm tra</h2>
    <p class="muted" style="margin-top:4px">Chọn dạng và chế độ kiểm tra:</p>
    <h3 style="margin:14px 0 6px">Trắc nghiệm (từ vựng)</h3>
    <div class="row">
      <button class="btn primary sm" data-q="mc:en-vi">Anh → Việt</button>
      <button class="btn primary sm" data-q="mc:vi-en">Việt → Anh</button>
    </div>
    <h3 style="margin:18px 0 6px">Điền từ (từ vựng)</h3>
    <div class="row">
      <button class="btn cyan sm" data-q="fill:en-vi">Anh → Việt</button>
      <button class="btn cyan sm" data-q="fill:vi-en">Việt → Anh</button>
    </div>
    <h3 style="margin:18px 0 6px">Viết câu (câu dài)</h3>
    <div class="row">
      <button class="btn ghost sm" data-q="sentfill:vi-en">Câu Việt → viết tiếng Anh</button>
    </div>
    <p class="muted" style="font-size:12px;margin-top:16px">Mỗi lượt 10 câu (hoặc ít hơn nếu chưa đủ), có chấm điểm.</p>
  `);
  bindClose();
  modalBody.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>{
    const [type,dir]=b.dataset.q.split(":");
    if(type==="sentfill"){ if(sentences.length<1)return toast("Cần thêm câu dài"); startQuiz({src:"sent",dir,type:"fill"}); }
    else { if(words.length<4)return toast("Cần ít nhất 4 từ"); startQuiz({src:"word",dir,type}); }
  });
}

let quiz=null;
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function norm(s){ return (s||"").toLowerCase().trim().replace(/[.,!?;:'"]/g,"").replace(/\s+/g," "); }
function startQuiz(cfg){
  const pool = cfg.src==="word" ? words : sentences;
  const items = shuffle(pool).slice(0, Math.min(10,pool.length));
  quiz={cfg,items,i:0,score:0,wrong:[]};
  nextQuiz();
}
function qPrompt(it,cfg){
  if(cfg.src==="word") return cfg.dir==="en-vi"?it.word:it.meaning;
  return cfg.dir==="en-vi"?it.en:it.vi;
}
function qAnswer(it,cfg){
  if(cfg.src==="word") return cfg.dir==="en-vi"?it.meaning:it.word;
  return cfg.dir==="en-vi"?it.vi:it.en;
}
function nextQuiz(){
  const {cfg,items,i}=quiz;
  if(i>=items.length) return finishQuiz();
  const it=items[i], prompt=qPrompt(it,cfg), answer=qAnswer(it,cfg);
  const head=`<div class="row between"><span class="muted">Câu ${i+1}/${items.length}</span><span class="muted">Điểm: ${quiz.score}</span></div>`;
  const promptBox=`<div class="glass center" style="padding:22px;margin:14px 0"><div class="big" style="font-size:22px">${esc(prompt)}</div>${cfg.src==="word"&&cfg.dir==="vi-en"?"":`<span class="speak" data-say="${esc(cfg.src==='word'?(cfg.dir==='en-vi'?it.word:''):'')}"></span>`}</div>`;
  if(cfg.type==="mc"){
    const others=shuffle(words.filter(w=>w.id!==it.id)).slice(0,3).map(w=>cfg.dir==="en-vi"?w.meaning:w.word);
    const opts=shuffle([answer,...others]);
    openModal(`<button class="close" onclick="window.__close()">×</button><h2>🎯 Trắc nghiệm</h2>${head}${promptBox}
      <div id="opts">${opts.map(o=>`<button class="btn ghost" style="width:100%;margin:7px 0;text-align:left" data-opt="${esc(o)}">${esc(o)}</button>`).join("")}</div>`);
    bindClose();
    modalBody.querySelectorAll("[data-opt]").forEach(b=>b.onclick=()=>{
      const ok=b.dataset.opt===answer;
      gradeStep(ok,it,prompt,b.dataset.opt,answer);
    });
  } else {
    openModal(`<button class="close" onclick="window.__close()">×</button><h2>✍️ Điền từ</h2>${head}${promptBox}
      <input id="qIn" placeholder="Nhập đáp án…" autocomplete="off" autocorrect="off" autocapitalize="off">
      <div class="row" style="margin-top:14px"><button class="btn primary" id="qOk">Kiểm tra</button></div>`);
    bindClose();
    const submit=()=>{ const val=$("#qIn").value; gradeStep(norm(val)===norm(answer),it,prompt,val,answer); };
    $("#qOk").onclick=submit;
    $("#qIn").addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
    $("#qIn").focus();
  }
  modalBody.querySelectorAll("[data-say]").forEach(b=>{ if(b.dataset.say) b.onclick=()=>speak(b.dataset.say); });
}
function gradeStep(ok,it,prompt,given,answer){
  if(ok) quiz.score++; else quiz.wrong.push({prompt,given:given||"(trống)",answer});
  const fb=`<div class="glass center" style="padding:18px;margin:14px 0">
      <div class="${ok?'res-good':'res-bad'}" style="font-size:20px">${ok?"✓ Chính xác!":"✗ Chưa đúng"}</div>
      ${ok?"":`<div style="margin-top:8px">Đáp án: <b>${esc(answer)}</b></div>`}
    </div>
    <button class="btn primary" id="qNext" style="width:100%">${quiz.i+1>=quiz.items.length?"Xem kết quả":"Câu tiếp →"}</button>`;
  openModal(`<button class="close" onclick="window.__close()">×</button><h2>🎯 Kiểm tra</h2>${fb}`);
  bindClose();
  $("#qNext").onclick=()=>{ quiz.i++; nextQuiz(); };
}
function finishQuiz(){
  const total=quiz.items.length, pct=Math.round(quiz.score/total*100);
  const wrong=quiz.wrong.map(w=>`<div class="item"><div style="min-width:0"><div class="muted" style="font-size:13px">${esc(w.prompt)}</div><div class="res-bad" style="font-size:13px">Bạn: ${esc(w.given)}</div><div class="res-good" style="font-size:13px">Đúng: ${esc(w.answer)}</div></div></div>`).join("");
  openModal(`<button class="close" onclick="window.__close()">×</button><h2>🏁 Kết quả</h2>
    <div class="glass center" style="padding:26px;margin:14px 0">
      <div class="big" style="font-size:40px">${quiz.score}/${total}</div>
      <div style="font-size:20px;color:${pct>=70?'var(--good)':pct>=40?'var(--accent2)':'var(--bad)'}">${pct}% ${pct>=70?'🎉 Giỏi lắm!':pct>=40?'💪 Cố lên!':'📖 Ôn thêm nhé!'}</div>
    </div>
    ${quiz.wrong.length?`<h3>Câu sai (${quiz.wrong.length})</h3><div class="scroll">${wrong}</div>`:`<p class="center res-good">Tuyệt vời, không sai câu nào!</p>`}
    <div class="row" style="margin-top:16px"><button class="btn primary" onclick="window.__back('quiz')">Làm lại</button><button class="btn ghost" onclick="window.__close()">Đóng</button></div>`);
  bindClose();
}

/* ---------- Backup ---------- */
$("#btnBackup").onclick=()=>{
  const data={words,sentences,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="english-backup-"+Date.now()+".json"; a.click();
  toast("Đã tải file sao lưu");
};

/* ---------- modal global helpers ---------- */
window.__close=closeModal;
window.__back=(v)=>{ openView=v; render(); };
function bindClose(){ const c=modalBody.querySelector(".close"); if(c) c.onclick=closeModal; }
</script>
</body>
</html>
